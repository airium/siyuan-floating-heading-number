name: Release
run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version from plugin.json (without the v prefix)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Require the main branch
        env:
          RELEASE_REF: ${{ github.ref }}
        run: |
          if [ "$RELEASE_REF" != "refs/heads/main" ]; then
            echo "Releases must be dispatched from main, not $RELEASE_REF" >&2
            exit 1
          fi

      - name: Check out the release commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node scripts/version.mjs check "$RELEASE_VERSION"

      - name: Require a new tag and release
        uses: actions/github-script@v9
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        with:
          script: |
            const tag = `v${process.env.RELEASE_VERSION}`;
            const {owner, repo} = context.repo;

            async function requireMissing(label, request) {
              try {
                await request();
              } catch (error) {
                if (error.status === 404) return;
                throw error;
              }
              throw new Error(`${label} ${tag} already exists`);
            }

            await requireMissing("Tag", () => github.rest.git.getRef({owner, repo, ref: `tags/${tag}`}));
            await requireMissing("Release", () => github.rest.repos.getReleaseByTag({owner, repo, tag}));

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and build
        run: pnpm check

      - name: Prepare release notes
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node scripts/release-notes.mjs "$RELEASE_VERSION" > "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$RELEASE_VERSION" package.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v$RELEASE_VERSION" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
